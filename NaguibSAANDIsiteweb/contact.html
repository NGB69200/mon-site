    <section class="contact-section">
        <div class="contact-form">

            <form id="contactForm" action="#" method="post">

                <label for="sujet">Sujet :</label>
                <br>
                <textarea type="text" id="sujet" name="sujet" class="contacto"  rows="4" cols="50" required
                    placeholder="Entrez le sujet"></textarea>
                <br><br>

                <label for="prenom">Prénom :</label>
                <br>
                <textarea type="text" id="prenom" name="prenom" class="contacto"  rows="4" cols="50" required
                    placeholder="Entrez votre prénom"></textarea>
                <br><br>

                <label for="nom">Nom :</label>
                <br>
                <textarea type="text" id="nom"  name="nom" rows="4" class="contacto" cols="50" required
                    placeholder="Entrez votre nom"></textarea>
                <br><br>

                <label for="telephone">Téléphone :</label>
                <br>
                <textarea type="text" id="telephone" name="telephone" class="contacto"  rows="4" cols="50" required
                    placeholder="Entrez votre numéro"></textarea>
                <br><br>

                <label for="email">Email :</label>
                <br>
                <textarea type="email" id="email" name="email" class="contacto"  rows="4" cols="50" required
                    placeholder="Entrez votre email"></textarea>
                <br><br>

                <label for="commentaires">Commentaires :</label>
                <br>
                <textarea id="commentaires" name="commentaires" class="contacto"  required rows="4" cols="50" minlength="10"
                    maxlength="200" placeholder="Écrivez votre message ici"></textarea>
                <br><br>

                
                <label>
                    <input type="checkbox" name="newsletter" checked>
                    M’abonner à la newsletter
                </label>
                <br><br>

                <button type="submit">Envoyer</button>

            </form>





        </div>

        <div class="contact-info">
            <p>28 Rue Léo Lagrange</p>
            <p>69200 Vénissieux</p>
            <p>Aureonemonssite.com</p>
            <p>07 69 19 12 82</p>
        </div>
    </section>

    <footer>

    </footer>
</body>
